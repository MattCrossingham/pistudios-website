<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pi Studios | Unsubscribe</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <style>
        :root {
            --bg-color: #050505;
            --text-color: #ffffff;
            --secondary-text: #a1a1a6;
            --accent-color: #0a84ff;
            --card-bg: rgba(255, 255, 255, 0.03);
            --card-border: rgba(255, 255, 255, 0.08);
            --nav-bg: rgba(5, 5, 5, 0.7);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Navigation */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            background-color: var(--nav-bg);
            backdrop-filter: saturate(180%) blur(20px);
            -webkit-backdrop-filter: saturate(180%) blur(20px);
            border-bottom: 1px solid var(--card-border);
            z-index: 1000;
        }

        .nav-content {
            max-width: 1200px;
            margin: 0 auto;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-logo {
            font-weight: 700;
            font-size: 1.2rem;
            text-decoration: none;
            color: var(--text-color);
            letter-spacing: -0.02em;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-logo img {
            width: 28px;
            height: 28px;
            border-radius: 6px;
        }

        .nav-links a {
            color: var(--text-color);
            text-decoration: none;
            margin-left: 2.5rem;
            font-size: 0.9rem;
            font-weight: 500;
            opacity: 0.8;
            transition: opacity 0.2s;
        }

        .nav-links a:hover {
            opacity: 1;
        }

        /* Layout */
        .container {
            max-width: 600px;
            margin: 150px auto 4rem auto;
            padding: 2rem;
            text-align: center;
            flex-grow: 1;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            letter-spacing: -0.02em;
            color: var(--text-color);
        }

        p {
            font-size: 1.1rem;
            color: var(--secondary-text);
            margin-bottom: 1.5rem;
        }

        .section {
            background-color: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            padding: 3rem;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }

        a {
            color: var(--accent-color);
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        /* Footer */
        footer {
            border-top: 1px solid var(--card-border);
            padding: 4rem 2rem;
            text-align: center;
            color: var(--secondary-text);
            font-size: 0.95rem;
        }

        footer a {
            color: var(--text-color);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s;
        }

        footer a:hover {
            color: var(--accent-color);
        }

        /* Mobile Adjustments */
        @media (max-width: 768px) {
            .nav-content {
                flex-direction: column;
                padding: 1rem;
            }
            .nav-logo {
                margin-bottom: 1rem;
            }
            .nav-links {
                display: none;
            }
        }
    </style>
</head>
<body>

    <nav>
        <div class="nav-content">
            <a href="/" class="nav-logo">
                <img src="favicon.png" alt="Pi Studios Logo">
                Pi Studios
            </a>
            <div class="nav-links">
                <a href="/#about">Who We Are</a>
                <a href="/#apps">App Dev</a>
                <a href="downloads.html">Downloads</a>
                <a href="support.html">Support</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="section">
            <div style="font-size: 4rem; margin-bottom: 1rem;">✅</div>
            <h1>Unsubscribed</h1>
            <p id="message">You have been successfully removed from our mailing list. You won't receive any more automated emails from us.</p>
            <br>
            <p style="font-size: 0.9rem;">Made a mistake? <a href="mailto:info@pistudios.app">Contact us</a> to resubscribe.</p>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 Pi Studios. All rights reserved.</p>
    </footer>

    <script>
        // Extract email from URL parameter if present
        const urlParams = new URLSearchParams(window.location.search);
        const email = urlParams.get('email');
        if (email) {
            document.getElementById('message').innerText = `${email} has been successfully removed from our mailing list. You won't receive any more automated emails from us.`;
        }
    </script>
</body>
</html>
